<!doctype html>
<html lang="en">

    <title>Partner Website</title>

  <body>
    <div class="card">
      <h1>Partner Website</h1>
      <p>Click below to share your latest adventure to varful.ro.</p>

        <input name="user" value="petrubraha" />
        <input
          name="image"
          value="https://avatars.githubusercontent.com/u/153606307"
        />
        <input name="location" value="Bucegi" />
        <input name="location_slug" value="bucegi" />

      </form>
    </div>
  </body>
